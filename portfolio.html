<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أعمالي | عبدالله البلوشي</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #f0f2f5;
            --card: rgba(255,255,255,0.7);
            --text: #1a1a1a;
            --accent: #ff5f00; 
            --item: rgba(255, 255, 255, 0.9); 
            --border: rgba(0,0,0,0.05);
            --maalam-color: #34495e; 
            --maalam-bg: rgba(52, 73, 94, 0.1);
        }
        [data-theme="dark"] {
            --bg: #0a0a0a;
            --card: rgba(20,20,20,0.6);
            --text: #ffffff;
            --item: rgba(255,255,255,0.05); 
            --border: rgba(255,255,255,0.1);
            --maalam-color: #81ecec; 
            --maalam-bg: rgba(129, 236, 236, 0.15);
        }

        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body {
            margin: 0; padding: 20px;
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex; justify-content: center;
            perspective: 1000px;
        }

        .portfolio-container {
            width: 95%;
            /* تغییر مهم: عرض در پی‌سی آزادتر می‌شود و در موبایل محدود */
            max-width: 450px; 
            background: var(--card);
            border-radius: 35px;
            padding: 30px 20px;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            transition: max-width 0.5s ease;
        }

        /* تنظیمات اختصاصی برای مانیتورهای بزرگ */
        @media (min-width: 800px) {
            .portfolio-container {
                max-width: 1400px; /* اجازه رشد تا عرض زیاد */
                width: 90%;
            }
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding: 0 10px;
        }

        .home-btn {
            width: 45px; height: 45px; background: var(--item);
            border-radius: 15px; display: flex; justify-content: center; align-items: center;
            text-decoration: none; color: var(--text);
        }

        .theme-switcher-portfolio {
            width: 45px; height: 45px; background: var(--card);
            border-radius: 50%; cursor: pointer; color: var(--accent);
            display: flex; justify-content: center; align-items: center;
            border: 1px solid var(--border);
        }

        .projects-grid {
            display: grid;
            /* تغییر مهم: auto-fit باعث می‌شود کارت‌ها فضا را کاملاً پر کنند */
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .project-card {
            background: var(--item);
            border-radius: 22px;
            overflow: hidden;
            border: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            display: flex; flex-direction: column;
            height: 100%;
            transform-style: preserve-3d;
            position: relative;
        }

        .project-card:hover {
            transform: translateY(-8px) scale(1.02) rotateX(4deg);
            box-shadow: 0 12px 25px var(--card-glow);
            border-color: rgba(255,255,255,0.2);
        }

        .project-img {
            width: 100%; height: 110px;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px;
        }

        .project-info {
            padding: 15px; text-align: right;
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center;
        }

        .project-info h3 { font-size: 14px; margin: 0 0 5px; font-family: 'Almarai', sans-serif; font-weight: 800; }
        .project-info p { font-size: 11px; margin: 0; opacity: 0.7; }

        /* موبایل‌های کوچک: اجبار به ۲ ستون */
        @media (max-width: 480px) {
            .projects-grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 12px; 
            }
            .project-img { height: 90px; font-size: 28px; }
            .project-info h3 { font-size: 12px; }
        }

        .fab-contact {
            position: fixed; bottom: 30px; left: 30px;
            background: var(--accent); color: white;
            width: 55px; height: 55px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; box-shadow: 0 10px 20px rgba(255, 95, 0, 0.2);
            text-decoration: none; z-index: 100;
        }
    </style>
</head>
<body data-theme="light">

    <div class="portfolio-container">
        <div class="header">
            <a href="index.html" class="home-btn"><i class="fas fa-home"></i></a>
            <h2>معرض الأعمال</h2>
            <div class="theme-switcher-portfolio" onclick="toggleTheme()"><i id="theme-icon" class="fas fa-moon"></i></div>
        </div>

        <div class="projects-grid">
            
            <a href="https://hrm.mnu.workers.dev/" class="project-card" style="--card-glow: rgba(129, 236, 236, 0.15);">
                <div class="project-img" style="color: var(--maalam-color); background-color: var(--maalam-bg);">
                    <i class="fas fa-kaaba"></i>
                </div>
                <div class="project-info">
                    <h3>معالم الحرمين</h3>
                    <p>مشروع معالم الحرمين للميداليات بتقنية NFC</p>
                </div>
            </a>

            <a href="folder1/index.html" class="project-card" style="--card-glow: rgba(255, 95, 0, 0.15);">
                <div class="project-img" style="color: #ff5f00; background-color: rgba(255, 95, 0, 0.1);">
                    <i class="fas fa-utensils"></i>
                </div>
                <div class="project-info">
                    <h3>منيو مطعم</h3>
                    <p>تصميم تفاعلي مودرن</p>
                </div>
            </a>

            <a href="folder2/index.html" class="project-card" style="--card-glow: rgba(0, 210, 255, 0.15);">
                <div class="project-img" style="color: #00d2ff; background-color: rgba(0, 210, 255, 0.1);">
                    <i class="fas fa-cube"></i>
                </div>
                <div class="project-info">
                    <h3>ميدالية لوجو</h3>
                    <p>طباعة ثلاثية الأبعاد</p>
                </div>
            </a>

            <a href="folder3/index.html" class="project-card" style="--card-glow: rgba(255, 188, 0, 0.15);">
                <div class="project-img" style="color: #ffbc00; background-color: rgba(255, 188, 0, 0.1);">
                    <i class="fas fa-star"></i>
                </div>
                <div class="project-info">
                    <h3>ستاند NFC</h3>
                    <p>تقييمات جوجل ماب</p>
                </div>
            </a>

            <a href="folder4/index.html" class="project-card" style="--card-glow: rgba(165, 94, 234, 0.15);">
                <div class="project-img" style="color: #a55eea; background-color: rgba(165, 94, 234, 0.1);">
                    <i class="fas fa-video"></i>
                </div>
                <div class="project-info">
                    <h3>فيديو ترويجي</h3>
                    <p>موشن جرافيك منيو</p>
                </div>
            </a>

            <a href="icon/index.html" class="project-card" style="--card-glow: rgba(38, 222, 129, 0.15);">
                <div class="project-img" style="color: #26de81; background-color: rgba(38, 222, 129, 0.1);">
                    <i class="fas fa-share-nodes"></i>
                </div>
                <div class="project-info">
                    <h3>مكتبة الأيقونات</h3>
                    <p>أيقونات التواصل الاجتماعي</p>
                </div>
            </a>

        </div>
    </div>

    <a href="https://wa.me/966548471318" class="fab-contact"><i class="fab fa-whatsapp"></i></a>

    <script>
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                icon.className = "fas fa-sun";
            } else {
                body.setAttribute('data-theme', 'light');
                icon.className = "fas fa-moon";
            }
        }
    </script>
</body>
</html>
