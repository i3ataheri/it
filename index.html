<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عبدالله البلوشي | UI Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --bg: #f0f2f5;
  --card: rgba(255,255,255,0.25);
  --text: #1a1a1a;
  --accent: #ff5f00;
  --item: rgba(230, 230, 235, 0.6); 
  --border: rgba(0,0,0,0.05);
  --glow: rgba(255, 95, 0, 0.3);
  --btn-alt: #d4af37; 
}
[data-theme="dark"] {
  --bg: #0a0a0a;
  --card: rgba(20,20,20,0.4);
  --text: #ffffff;
  --accent: #00d2ff;
  --item: rgba(255,255,255,0.08); 
  --border: rgba(255,255,255,0.1);
  --glow: rgba(0, 210, 255, 0.4);
  --btn-alt: #ffcc00;
}
* { box-sizing: border-box; transition: 0.3s ease-in-out; }

body {
  margin: 0;
  font-family: 'Tajawal', sans-serif;
  background-color: var(--bg);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: var(--text);
}

.mobile-profile {
  width: 92%;
  max-width: 380px;
  background: var(--card);
  border-radius: 35px;
  padding: 50px 20px 30px;
  text-align: center;
  position: relative;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
  border: 1px solid var(--border);
}

.theme-switcher {
  position: absolute;
  top: 25px;
  right: 25px;
  width: 45px;
  height: 45px;
  background: var(--card);
  border-radius: 50%;
  cursor: pointer;
  color: var(--accent);
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 0 15px var(--glow);
}

.profile-icon-box {
  width: 90px;
  height: 90px;
  background: var(--accent);
  border-radius: 35% 65% 65% 35% / 35% 35% 65% 65%;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0 auto 20px;
  font-size: 36px;
  color: #fff;
  box-shadow: 0 0 25px var(--glow);
}

h1 {
  font-family: 'Almarai', sans-serif;
  font-weight: 800;
  font-size: 26px;
}

.occupation {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 30px;
  display: block;
}

.services-list {
  text-align: right;
  margin-bottom: 30px;
  padding: 0;
  list-style: none;
}

.services-list li {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  background: var(--item);
  padding: 14px 18px;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid var(--border);
}

.buttons-row {
  display: flex;
  gap: 10px;
}

.btn-whatsapp {
  flex: 1.4;
  background: #25D366; /* سبز واتساپ */
  color: #fff;
  padding: 16px;
  border-radius: 20px;
  text-decoration: none;
  font-weight: 800;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
}

.btn-portfolio {
  flex: 1;
  background: var(--btn-alt);
  color: #fff;
  padding: 16px;
  border-radius: 20px;
  text-decoration: none;
  font-weight: 800;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
}
</style>
</head>

<body data-theme="light">

<div class="mobile-profile">

  <div class="theme-switcher" onclick="toggleTheme()">
    <i id="theme-icon" class="fas fa-moon"></i>
  </div>

  <div class="profile-icon-box">
    <i class="fas fa-laptop-code"></i>
  </div>

  <h1>عبدالله البلوشي</h1>
  <span class="occupation">Creative Developer</span>

  <ul class="services-list">
    <li><i class="fas fa-code"></i> تصميم وبرمجة قوائم HTML</li>
    <li><i class="fas fa-utensils"></i> تصميم منيو أونلاين</li>
    <li><i class="fas fa-video"></i> منيو فيديو احترافي</li>
    <li><i class="fas fa-cube"></i> طباعة 3D</li>
    <li><i class="fas fa-star"></i> ستاند تقييم جوجل</li>
    <li><i class="fas fa-layer-group"></i> هدايا ثلاثية الأبعاد</li>
  </ul>

  <div class="buttons-row">
    <a href="https://wa.me/966548471318" class="btn-whatsapp" target="_blank">
      <i class="fab fa-whatsapp"></i> اطلب الآن
    </a>

    <!-- ✅ اصلاح شد اینجا -->
    <a href="portfolio/index.html" class="btn-portfolio">
      أعمالي <i class="fas fa-briefcase"></i>
    </a>
  </div>

</div>

<script>
function toggleTheme() {
  const body = document.body;
  const icon = document.getElementById('theme-icon');

  if (body.getAttribute('data-theme') === 'light') {
    body.setAttribute('data-theme', 'dark');
    icon.className = "fas fa-sun";
  } else {
    body.setAttribute('data-theme', 'light');
    icon.className = "fas fa-moon";
  }
}
</script>

</body>
</html>
