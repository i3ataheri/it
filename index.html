<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عبدالله البلوشي</title>

<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --bg: #f0f2f5;
  --card: rgba(255,255,255,0.25);
  --text: #1a1a1a;
  --accent: #ff5f00;
  --item: rgba(230, 230, 235, 0.6); 
  --border: rgba(0,0,0,0.05);
  --glow: rgba(255, 95, 0, 0.3);
  --btn-alt: #d4af37; 
}
[data-theme="dark"] {
  --bg: #0a0a0a;
  --card: rgba(20,20,20,0.4);
  --text: #ffffff;
  --accent: #00d2ff;
  --item: rgba(255,255,255,0.08); 
  --border: rgba(255,255,255,0.1);
  --glow: rgba(0, 210, 255, 0.4);
  --avatar-border: #00d2ff; /* همان فیروزه‌ای */
  --avatar-glow: rgba(0, 210, 255, 0.6); /* درخشش قوی‌تر */
}
  --btn-alt: #ffcc00;
}

* { box-sizing: border-box; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

body {
  margin: 0; padding: 0;
  font-family: 'Tajawal', sans-serif;
  background-color: var(--bg);
  height: 100vh;
  display: flex; justify-content: center; align-items: center;
  color: var(--text);
  overflow: hidden;
}

.mobile-profile {
  width: 95%; max-width: 380px;
  background: var(--card);
  border-radius: 35px;
  padding: 50px 20px 30px;
  text-align: center;
  position: relative;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
  border: 1px solid var(--border);
}

/* --- انیمیشن آیکون تغییر تم --- */
.theme-switcher {
  position: absolute;
  top: 25px; right: 25px;
  width: 45px; height: 45px;
  background: var(--card);
  border-radius: 50%;
  cursor: pointer;
  color: var(--accent);
  display: flex; justify-content: center; align-items: center;
  box-shadow: 0 0 15px var(--glow);
  z-index: 100;
}

.theme-switcher i {
  font-size: 20px;
  transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.3s;
}

.theme-switcher:active i {
  transform: scale(0.5) rotate(180deg);
}

/* --- انیمیشن آواتار --- */
@keyframes avatarFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); border-radius: 35% 65% 65% 35% / 35% 35% 65% 65%; }
  50% { transform: translateY(-10px) rotate(5deg); border-radius: 50%; }
}

.profile-icon-box {
  width: 95px; height: 95px;
  background: var(--card); /* همرنگ پس‌زمینه شیشه‌ای */
  backdrop-filter: blur(10px);
  display: flex; justify-content: center; align-items: center;
  margin: 0 auto 25px;
  
  /* حاشیه با رنگ بنفش لوگوی تو */
  border: 2.5px solid #f7941d; 
  
  /* سایه بنفش ملایم برای عمق دادن به آواتار */
  box-shadow: 0 8px 20px rgba(134, 101, 172, 0.2); 
  
  animation: avatarFloat 4s ease-in-out infinite;
  border-radius: 35% 65% 65% 35% / 35% 35% 65% 65%; /* شکل نامنظم جذاب */
  overflow: hidden;
}

/* استایل برای حالت شب - درخشش نئونی بنفش */
[data-theme="dark"] .profile-icon-box {
  border-color: #00d2ff; /* رنگ فیروزه‌ای */
  box-shadow: 0 0 20px rgba(0, 210, 255, 0.6); /* درخشش فیروزه‌ای قوی‌تر */
}

.profile-icon-box img {
  width: 65px;
  height: 65px;
  object-fit: contain;
}

h1 { font-family: 'Almarai', sans-serif; font-weight: 800; font-size: 26px; margin-bottom: 8px; }

.occupation {
  font-size: 13.5px; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: 2.1px;
  margin-bottom: 30px; display: block;
}

.services-list { text-align: right; margin-bottom: 30px; padding: 0; list-style: none; }
.services-list li {
  font-size: 14px; font-weight: 600;
  margin-bottom: 12px;
  background: var(--item); 
  padding: 14px 18px; border-radius: 18px;
  display: flex; align-items: center; justify-content: flex-start;
  border: 1px solid var(--border);
}
.services-list i { color: var(--accent); font-size: 16px; margin-left: 12px; }

/* --- انیمیشن دکمه‌ها با خط داخلی --- */
.buttons-row { display: flex; gap: 10px; position: relative; z-index: 10; }

.btn-whatsapp, .btn-portfolio {
  position: relative;
  border-radius: 20px;
  text-decoration: none;
  font-weight: 800;
  display: flex; justify-content: center; align-items: center; gap: 8px;
  padding: 16px;
  overflow: hidden;
}

.btn-whatsapp { flex: 1.4; background: #25D366; color: #fff; }
.btn-portfolio { flex: 1; background: var(--btn-alt); color: #fff; }

.btn-whatsapp::after, .btn-portfolio::after {
  content: '';
  position: absolute;
  top: 4px; left: 4px; right: 4px; bottom: 4px;
  border: 1.5px solid rgba(255, 255, 255, 0.7);
  border-radius: 16px;
  opacity: 0;
  transform: scale(0.9);
  transition: 0.3s ease;
  pointer-events: none;
}

.btn-whatsapp:hover::after, .btn-portfolio:hover::after { opacity: 1; transform: scale(1); }
.btn-whatsapp:hover, .btn-portfolio:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }

</style>
</head>
<body data-theme="light">

<div class="mobile-profile">
  <div class="theme-switcher" onclick="toggleTheme()">
    <i id="theme-icon" class="fas fa-moon"></i>
  </div>

  <div class="profile-icon-box">
    <img src="codeksa.svg" alt="Avatar">
  </div>

  <h1>عبدالله البلوشي</h1>
  <span class="occupation">Creative Developer</span>

  <ul class="services-list">
    <li><i class="fas fa-code"></i> تصميم وبرمجة HTML</li>
    <li><i class="fas fa-utensils"></i> تصميم منــــــــــيو أونلاين</li>
    <li><i class="fas fa-video"></i> منيو فيديو احـــــــــــــترافي</li>
    <li><i class="fas fa-cube"></i> طــــــــــــــــــــــــــــــــــــــــــــــــباعة 3D</li>
    <li><i class="fas fa-star"></i> ســــــــــــــــتاند تقييم جوجل</li>
    <li><i class="fas fa-layer-group"></i> هدايا ثلاثــــــــــــــــية الأبعاد</li>
  </ul>

  <div class="buttons-row">
    <a href="https://wa.me/966548471318" class="btn-whatsapp" target="_blank">
      <i class="fab fa-whatsapp"></i> اطلب الآن
    </a>
    <a href="portfolio/index.html" class="btn-portfolio">
       أعمالي <i class="fas fa-briefcase"></i>
    </a>
  </div>
</div>

<script>
function toggleTheme() {
  const body = document.body;
  const icon = document.getElementById('theme-icon');
  
  icon.style.transform = "rotate(360deg) scale(0)";
  
  setTimeout(() => {
    if (body.getAttribute('data-theme') === 'light') {
      body.setAttribute('data-theme', 'dark');
      icon.className = "fas fa-sun";
    } else {
      body.setAttribute('data-theme', 'light');
      icon.className = "fas fa-moon";
    }
    icon.style.transform = "rotate(0deg) scale(1)";
  }, 300);
}
</script>

</body>
</html>
