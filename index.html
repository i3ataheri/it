<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عبدالله البلوشي | UI Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
  --bg: #f0f2f5;
  --card: rgba(255,255,255,0.2);
  --text: #1a1a1a;
  --accent: #ff5f00;
  --item: rgba(255,255,255,0.15);
  --border: rgba(255,255,255,0.3);
  --glow: rgba(255, 95, 0, 0.3);
}

[data-theme="dark"] {
  --bg: #0a0a0a;
  --card: rgba(20,20,20,0.4);
  --text: #ffffff;
  --accent: #00d2ff;
  --item: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --glow: rgba(0, 210, 255, 0.4);
}

* { box-sizing: border-box; transition: 0.3s ease-in-out; }

body {
  margin: 0; padding: 0;
  font-family: 'Tajawal', sans-serif;
  background-color: var(--bg);
  height: 100vh;
  display: flex; justify-content: center; align-items: center;
  color: var(--text);
}

.mobile-profile {
  width: 90%; max-width: 380px;
  background: var(--card);
  border-radius: 30px;
  padding: 50px 25px 30px;
  text-align: center;
  position: relative;
  backdrop-filter: blur(15px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

.theme-switcher {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 50px; height: 50px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 50%;
  cursor: pointer;
  color: var(--accent);
  display: flex; justify-content: center; align-items: center;
  box-shadow: 0 0 15px var(--glow);
  transition: 0.3s ease;
}
.theme-switcher:hover { transform: scale(1.1); box-shadow: 0 0 25px var(--glow); }

.profile-icon-box {
  width: 90px; height: 90px;
  background: var(--accent);
  border-radius: 35% 65% 65% 35% / 35% 35% 65% 65%;
  display: flex; justify-content: center; align-items: center;
  margin: 0 auto 20px;
  font-size: 36px; color: #fff;
  box-shadow: 0 0 25px var(--glow);
  transition: 0.3s ease;
}
.profile-icon-box:hover { transform: scale(1.05) rotate(5deg); }

h1 { font-family: 'Almarai', sans-serif; font-weight: 800; font-size: 28px; margin-bottom: 5px; }

.occupation {
  font-size: 13px; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 30px; display: block;
}

.services-list { text-align: right; margin-bottom: 30px; padding: 0; list-style: none; }

.services-list li {
  font-size: 14px; font-weight: 600;
  margin-bottom: 12px;
  background: var(--item);
  padding: 14px 18px; border-radius: 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-left: 1px solid var(--border);
  transition: 0.3s ease;
}
.services-list li:hover { transform: translateX(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

.services-list i { color: var(--accent); font-size: 16px; }
.list-text { flex-grow: 1; margin-right: 15px; }

.btn-whatsapp {
  background: var(--accent); color: #fff;
  padding: 18px; border-radius: 25px;
  text-decoration: none; font-weight: 800; font-size: 18px;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  box-shadow: 0 8px 25px var(--glow);
  transition: 0.3s ease;
}
.btn-whatsapp:hover { transform: translateY(-3px) scale(1.05); filter: brightness(1.1); }

.btn-portfolio {
  margin-top: 15px; display: block;
  color: var(--text); text-decoration: none;
  font-weight: 700; font-size: 15px; opacity: 0.6;
  transition: 0.3s ease;
}
.btn-portfolio:hover { opacity: 1; }

</style>
</head>
<body data-theme="light">

<div class="mobile-profile">

  <div class="theme-switcher" onclick="toggleTheme()">
    <i id="theme-icon" class="fas fa-moon"></i>
  </div>

  <div class="profile-icon-box">
    <i class="fas fa-laptop-code"></i>
  </div>
  
  <h1>عبدالله البلوشي</h1>
  <span class="occupation">Creative Developer</span>

  <ul class="services-list">
    <li><i class="fas fa-code"></i> <span class="list-text">تصميم وبرمجة قوائم HTML</span></li>
    <li><i class="fas fa-utensils"></i> <span class="list-text">تصميم منيو أونلاين تفاعلي</span></li>
    <li><i class="fas fa-video"></i> <span class="list-text">انشــــاء منيو فيديو احترافي</span></li>
    <li><i class="fas fa-cube"></i> <span class="list-text">طباعة ميدالـــــــــــــــــــــــــــيات 3D</span></li>
    <li><i class="fas fa-star"></i> <span class="list-text">ستاندات تقييم جوجل ذكية</span></li>
    <li><i class="fas fa-layer-group"></i> <span class="list-text">طباعة ثلاثية الأبعاد للهدايا</span></li>
  </ul>

  <a href="https://wa.me/966548471318" class="btn-whatsapp">
    <i class="fab fa-whatsapp"></i> اطلب الآن
  </a>
  <a href="portfolio.html" class="btn-portfolio">مشاهدة أعمالي</a>

</div>

<script>
function toggleTheme() {
  const body = document.body;
  const icon = document.getElementById('theme-icon');
  
  if (body.getAttribute('data-theme') === 'light') {
    body.setAttribute('data-theme', 'dark');
    icon.className = "fas fa-sun";
  } else {
    body.setAttribute('data-theme', 'light');
    icon.className = "fas fa-moon";
  }
}
</script>
</body>
</html>
